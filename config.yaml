wechat:
    appid: 填写你的微信公众号 AppID
    secret: 填写你的微信公众号 AppSecret
api:
    md2wechat_key: 填写 md2wechat API Key
    md2wechat_base_url: https://www.md2wechat.cn
    image_key: 填写 API Key
    image_base_url: https://ark.cn-beijing.volces.com/api/v3
    image_provider: volcengine
    image_model: doubao-seedream-5-0-260128
    image_size: 2K
    convert_mode: api
    default_theme: default
    background_type: none
    http_timeout: 30
image:
    compress: true
    max_width: 1920
    max_size_mb: 5